name: External Repo Scheduler

on:
  schedule:
    - cron:  '0 2 * * 3'
  workflow_dispatch:

jobs:
  get-release-version:
    name: Get Release Version
    runs-on: ubuntu-latest
    outputs:
      is_update: ${{ steps.check_version.outputs.is_update }}
      result: ${{ steps.check_version.outputs.result }}
      docker_tags: ${{ steps.check_version.outputs.docker_tags }}
    steps:
      - uses: mogeko/latest-version@v1.1.2
        id: check_version
        with:
          repo: kovidgoyal/calibre
  print-release-version:
    name: Print Release Version
    runs-on: ubuntu-latest
    needs: get-release-version
    steps:
      - run: |
          echo '${{ needs.get-release-version.outputs.is_update }}'
          echo '${{ needs.get-release-version.outputs.result }}' | jq '.'
          echo '${{ needs.get-release-version.outputs.docker_tags }}'
          echo 'CALIBRE_RELEASE_VERSION=$(echo ${{ needs.get-release-version.outputs.result }} | jq -r ".stable_version")' >> $GITHUB_ENV
